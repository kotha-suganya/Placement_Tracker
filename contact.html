<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Placement Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .social-icon {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }
    </style>
</head>
<body class="bg-gray-100">
     <!-- Navigation Bar -->
     <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between">
            <div class="text-white text-lg font-bold">Placement Tracker</div>
            <div class="space-x-4">
                <a href="index.htm" class="text-gray-300 hover:text-white">Home</a>
                <a href="about.html" class="text-gray-300 hover:text-white">About</a>
                <a href="dashboard.html" class="text-gray-300 hover:text-white">Services</a>
                <a href="companies.html" class="text-gray-300 hover:text-white">Our Companies</a>
                <a href="logout.html" class="text-gray-300 hover:text-white">Logout</a>
                
                
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-4 text-center">Contact Us</h1>
        <form id="contact-form" class="bg-white p-6 rounded-lg shadow-lg">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700" for="first-name">First Name</label>
                    <input class="w-full px-3 py-2 border rounded-lg" id="first-name" required type="text"/>
                </div>
                <div>
                    <label class="block text-gray-700" for="last-name">Last Name</label>
                    <input class="w-full px-3 py-2 border rounded-lg" id="last-name" required type="text"/>
                </div>
                <div>
                    <label class="block text-gray-700" for="gender">Gender</label>
                    <select class="w-full px-3 py-2 border rounded-lg" id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700" for="email">Email</label>
                    <input class="w-full px-3 py-2 border rounded-lg" id="email" required type="email"/>
                </div>
                <div>
                    <label class="block text-gray-700" for="mobile">Mobile Number</label>
                    <input class="w-full px-3 py-2 border rounded-lg" id="mobile" required type="tel"/>
                </div>
                <div>
                    <label class="block text-gray-700" for="profession">Profession</label>
                    <input class="w-full px-3 py-2 border rounded-lg" id="profession" required type="text"/>
                </div>
                <div class="col-span-2">
                    <label class="block text-gray-700" for="query">Your Query</label>
                    <textarea class="w-full px-3 py-2 border rounded-lg" id="query" rows="4" required></textarea>
                </div>
            </div>
            <button class="mt-4 bg-blue-500 text-white py-2 px-4 rounded" type="submit">Submit</button>
        </form>

        <div class="mt-8">
            <h2 class="text-2xl font-bold mb-2">Contact Information</h2>
            <p class="text-gray-700">Email: <a href="mailto:info@placementtracker.com" class="text-blue-500">info@placementtracker.com</a></p>
            <p class="text-gray-700">Address: 3/c 402, Damodar Park, L B S Marg, Ghatkopar (west),Mumbai, India</p>
            <h2 class="text-2xl font-bold mt-4 mb-2">Follow Us</h2>
            <div class="flex items-center">
                <a href="https://www.linkedin.com" target="_blank" class="flex items-center">
                    <img src="https://static.vecteezy.com/system/resources/previews/023/986/970/non_2x/linkedin-logo-linkedin-logo-transparent-linkedin-icon-transparent-free-free-png.png" alt="LinkedIn" class="social-icon"/>
                    LinkedIn
                </a>
                <a href="https://www.twitter.com" target="_blank" class="flex items-center ml-4">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4n_urpJ9XpwOTdzBVbGvactwHrPagYQrTJPYjxfxLGkSyu7nJZVqRVGAeohnPgKMrnKE&usqp=CAU" alt="Twitter" class="social-icon"/>
                    Twitter
                </a>
                <a href="https://www.facebook.com" target="_blank" class="flex items-center ml-4">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbU1DCJjwDgtCAkNyr3IHcH2iuPAaPYSLcidF_rBOi-PSaxQ4R2I4vDvMpIQylYw0G_po&usqp=CAU" alt="Facebook" class="social-icon"/>
                    Facebook
                </a>
                <a href="https://www.instagram.com" target="_blank" class="flex items-center ml-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Instagram_logo_2022.svg/1000px-Instagram_logo_2022.svg.png" alt="Instagram" class="social-icon"/>
                    Instagram
                </a>
            </div>
        </div>
    </div>
</body>
</html>
